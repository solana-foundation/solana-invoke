name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
      - run: cargo build --workspace --all-features --verbose

  # Build the on-chain program(s) to SBF and publish artifacts
  build-sbf:
    name: build-sbf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Solana CLI
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.3.7/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Check Solana Install
        run: solana --version

      # Nightly toolchain is commonly required for SBF builds
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      # Build each Solana program crate in your workspace. Duplicate the step if
      # you have multiple programs, or point to the workspace manifest if you have
      # a dedicated 'programs' workspace. Replace paths accordingly.
      - name: Build Solana program (SBF)
        run: |
          # Example for one program crate:
          cargo build-sbf --manifest-path test-program/Cargo.toml
          # If multiple programs, repeat with each manifest.

      # Publish the deployable artifacts for downstream jobs
      - name: Upload SBF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbf-artifacts
          path: |
            target/deploy/*.so
            target/deploy/*-keypair.json
          if-no-files-found: error

  # Test now depends on SBF artifacts being available
  test:
    name: test
    runs-on: ubuntu-latest
    needs: build-sbf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      # Make the built programs available where solana-program-test expects them:
      # target/deploy/<program>.so and <program>-keypair.json
      - name: Download SBF artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbf-artifacts
          path: target/deploy

      # Run tests; solana-program-test will find the .so + keypair in target/deploy
      - name: Run tests (workspace)
        run: BPF_OUT_DIR=$PWD/target/deploy cargo test --workspace --all-features -- --nocapture
